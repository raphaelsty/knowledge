<!DOCTYPE html>
<html>

<head>
    <title>Knowledge Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="searchbox">
        <div id="backsearch"></div>
    </div>
    <div class="graph" id="graph"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.production.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.production.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three-spritetext@1.9.3/dist/three-spritetext.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/react-force-graph-3d@1.25.1/dist/react-force-graph-3d.min.js"
        defer></script>

    <script type="module">
        try {
            const { default: init, ColBERT } = await import('./pkg/pylate_rs.js');
            window.pylate_rs_module = { init: init, ColBERT: ColBERT, };
            if (window.onPylateRsLoaded) {
                window.onPylateRsLoaded();
            }
        } catch (err) {
            console.error("Failed to load or bridge the pylate_rs module:", err);
            if (window.onPylateRsError) {
                window.onPylateRsError();
            }
        }
    </script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        const Search = () => {
            const [query, setQuery] = useState("");
            const [node, setNode] = useState(null);
            const [k, setK] = useState(30);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            const [colbertModel, setColbertModel] = useState(null);
            const [modelStatus, setModelStatus] = useState("Waiting for Model Script...");

            const [documents, setDocuments] = useState([]);
            const [isSortedByDate, setIsSortedByDate] = useState(false);

            const searchTimerRef = useRef(null);
            const plotTimerRef = useRef(null);

            const loadColbertModel = useCallback(async () => {
                if (typeof window.pylate_rs_module === 'undefined') {
                    setModelStatus("Error: Script missing"); return;
                }
                try {
                    const { init, ColBERT } = window.pylate_rs_module;
                    setModelStatus("Initializing WASM...");
                    await init();
                    setModelStatus("Downloading Model Files...");
                    const modelRepo = "lightonai/answerai-colbert-small-v1";
                    const files = ['tokenizer.json', 'model.safetensors', 'config.json', 'config_sentence_transformers.json', '1_Dense/model.safetensors', '1_Dense/config.json', "special_tokens_map.json"];
                    const fetchAllFiles = async (basePath) => {
                        const responses = await Promise.all(files.map(file => fetch(`${basePath}/${file}`)));
                        for (const response of responses) if (!response.ok) throw new Error(`File not found: ${response.url}`);
                        return Promise.all(responses.map(res => res.arrayBuffer().then(b => new Uint8Array(b))));
                    };
                    const modelFiles = await fetchAllFiles(`https://huggingface.co/${modelRepo}/resolve/main`);
                    setModelStatus("Initializing ColBERT...");
                    const [tokenizer, model, config, stConfig, dense, denseConfig, tokensConfig] = modelFiles;
                    const loadedModel = new ColBERT(model, dense, tokenizer, config, stConfig, denseConfig, tokensConfig, 32);
                    setColbertModel(loadedModel);
                    setModelStatus("Model Ready");
                } catch (error) {
                    console.error("Failed to load ColBERT model:", error);
                    setModelStatus("Error Loading Model");
                }
            }, []);

            useEffect(() => {
                window.onPylateRsLoaded = loadColbertModel;
                window.onPylateRsError = () => setModelStatus("Error: Script Failed to Load");
                return () => { window.onPylateRsLoaded = null; window.onPylateRsError = null; };
            }, [loadColbertModel]);

            const getIndicatorClass = (status) => {
                if (status === "Model Ready") return 'status-ready';
                if (status.startsWith("Error")) return 'status-error';
                return 'status-loading';
            };

            const highlight = useCallback((text) => {
                if (!text) return "";
                let keywords = query;
                if (node) keywords += ` ${node}`;
                const keywordSet = new Set(keywords.split(/\s+/).filter(token => token.length > 2));
                if (keywordSet.size === 0) return <div className="inline">{text}</div>;
                const parts = text.split(new RegExp(`(${Array.from(keywordSet).join("|")})`, 'gi'));
                return (
                    <div className="inline">
                        {parts.map((part, i) =>
                            keywordSet.has(part.toLowerCase()) ? <div className="highlight" key={i}>{part}</div> : part
                        )}
                    </div>
                );
            }, [query, node]);

            const fetchLatest = useCallback(() => {
                const graphContainer = document.getElementById('graph');
                if (graphContainer) ReactDOM.unmountComponentAtNode(graphContainer);
                fetch(`http://127.0.0.1:8000/latest/30`)
                    .then(res => res.json())
                    .then(data => setDocuments(data.documents))
                    .catch(error => console.error("Failed to fetch latest documents:", error));
            }, []);

            const search = useCallback((searchQuery, searchK, sort = true) => {
                if (!searchQuery.trim()) { fetchLatest(); return; }
                fetch(`http://127.0.0.1:8000/search/${sort}/${node}/${searchK}/${searchQuery.replace("/", "")}`)
                    .then(res => res.json())
                    .then(data => {
                        const fetchedDocs = Object.values(data["documents"]);
                        if (colbertModel && fetchedDocs.length > 0 && sort) {
                            const docSummaries = fetchedDocs.map(doc => doc.summary || '');
                            try {
                                const { data: scoresData } = colbertModel.similarity({ queries: [searchQuery], documents: docSummaries });
                                const scores = scoresData[0];
                                const rankedDocs = fetchedDocs
                                    .map((doc, i) => ({ ...doc, colbertScore: scores[i] }))
                                    .sort((a, b) => b.colbertScore - a.colbertScore);
                                setDocuments(rankedDocs);
                            } catch (error) { console.error("ColBERT re-ranking failed:", error); setDocuments(fetchedDocs); }
                        } else { setDocuments(fetchedDocs); }
                    })
                    .catch(error => console.error("Failed to fetch search results:", error));
            }, [node, fetchLatest, colbertModel]);

            const handleHoverNode = useCallback((hoveredNode) => {
                if (hoveredNode) {
                    setNode(hoveredNode.id);
                    search(`${query} ${hoveredNode.id}`, k);
                    window.history.pushState({}, null, `?query=${encodeURIComponent(query)}&node=${encodeURIComponent(hoveredNode.id)}`);
                }
            }, [query, search, k]);

            const plot = useCallback((plotQuery, plotK) => {
                if (isMobile || !plotQuery.trim()) {
                    const graphContainer = document.getElementById('graph');
                    if (graphContainer && graphContainer.hasChildNodes()) ReactDOM.unmountComponentAtNode(graphContainer);
                    return;
                }
                fetch(`http://127.0.0.1:8000/plot/${plotK}/${plotQuery.replace("/", "")}`)
                    .then(res => res.json())
                    .then(data => {
                        ReactDOM.render(
                            <ForceGraph3D
                                graphData={data} backgroundColor="#131317" width={window.innerWidth / 2} height={window.innerHeight} showNavInfo={false} nodeAutoColorBy="group" linkOpacity={0.6} linkWidth={0.1}
                                nodeThreeObject={node => {
                                    const sprite = new SpriteText(node.id);
                                    sprite.color = node.color; sprite.textHeight = 4; sprite.fontSize = 50; sprite.fontFace = "Futura";
                                    return sprite;
                                }}
                                onNodeHover={handleHoverNode}
                            />,
                            document.getElementById('graph')
                        );
                    }).catch(error => console.error("Failed to plot graph:", error));
            }, [isMobile, handleHoverNode]);

            const runNow = useCallback((runQuery, runK, sort = true) => {
                clearTimeout(searchTimerRef.current);
                clearTimeout(plotTimerRef.current);
                search(runQuery, runK, sort);
                plot(runQuery, runK);
            }, [search, plot]);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth <= 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlQuery = params.get("query") || "";
                const urlNode = params.get("node") || null;
                if (urlQuery) {
                    setQuery(urlQuery);
                    runNow(urlQuery, k, true);
                    if (urlNode) { setNode(urlNode); search(`${urlQuery} ${urlNode}`, k); }
                } else { fetchLatest(); }
            }, []);

            const handleChangeText = (event) => {
                const newQuery = event.target.value.toLowerCase();
                setQuery(newQuery);
                setNode(null);
                setIsSortedByDate(false);
                window.history.pushState({}, null, `?query=${encodeURIComponent(newQuery)}`);
                clearTimeout(searchTimerRef.current);
                clearTimeout(plotTimerRef.current);
                searchTimerRef.current = setTimeout(() => search(newQuery, k), 200);
                plotTimerRef.current = setTimeout(() => plot(newQuery, k), 500);
            };

            const handleClickDate = () => {
                const newSortState = !isSortedByDate;
                setIsSortedByDate(newSortState);
                search(query, k, !newSortState);
            };

            const handleClickTag = (tag) => {
                const newQuery = `${query} ${tag}`.trim();
                setQuery(newQuery);
                setIsSortedByDate(false);
                const searchInput = document.getElementById("search");
                if (searchInput) searchInput.value = newQuery;
                window.history.pushState({}, null, `?query=${encodeURIComponent(newQuery)}`);
                runNow(newQuery, k, true);
            };

            return (
                <React.Fragment>
                    <div id="search-container">
                        <input id="search" type="textarea" placeholder="Neural Search" value={query} onChange={handleChangeText} autoFocus />
                        <span className={`status-indicator ${getIndicatorClass(modelStatus)}`}></span>
                    </div>

                    <div id="documents">
                        {(documents || []).map((doc, index) => (
                            <div className="document" key={doc.url || index}>
                                <a className="title" href={doc.url} target="_blank" rel="noopener noreferrer">{highlight(doc.title)}</a>
                                <div className="date" onClick={handleClickDate}>{highlight(doc.date)}</div>
                                <div className="summary">{highlight(doc.summary)}</div>
                                <div className="tags">
                                    {(doc.tags || []).concat(doc["extra-tags"] || []).map((tag, i) => (
                                        <div className="tag" key={i} onClick={() => handleClickTag(tag)}>{highlight(tag)}</div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('backsearch'));
        root.render(<Search />);
    </script>
</body>

</html>
