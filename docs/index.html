<body>
    <script>
        // Apply saved theme immediately to prevent flash

    <div id="searchbox">

    <div id="folder-panel"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { createRoot, createPortal } = ReactDOM;

        const API_BASE_URL = "https://knowledge.fly.dev";
        const SEARCH_DEBOUNCE_MS = 400;
        const FETCH_COUNT = 300;
        const DISPLAY_COUNT = 30;
        const RERANK_INACTIVITY_MS = 1000;
        const SUMMARY_TOKEN_LIMIT = 30;

        /**
         * Builds a reverse index: tagName -> top-level folder name.
         */
        const buildTagIndex = (tree) => {
            const index = {};
            if (!tree || !tree.c) return index;
            const walk = (node, topName) => {
                if (node.t) {
                    for (const [tagName] of node.t) {
                        if (!index[tagName]) index[tagName] = topName;
                    }
                }
                if (node.c) {
                    for (const child of node.c) walk(child, topName);
                }
            };
            for (const top of tree.c) walk(top, top.name);
            return index;
        };

        /**
         * Recursively filters the tree to only include paths that contain matching tags.
         * Returns null if no match found in this subtree.
         */
        const filterTree = (node, matchCounts) => {
            let filteredChildren = [];
            let filteredTags = [];
            let totalMatch = 0;

            if (node.c) {
                for (const child of node.c) {
                    const fc = filterTree(child, matchCounts);
                    if (fc) {
                        filteredChildren.push(fc);
                        totalMatch += fc._matchCount || 0;
                    }
                }
            }

            if (node.t) {
                for (const [tagName, tagCount, tagDocs] of node.t) {
                    if (matchCounts[tagName]) {
                        filteredTags.push([tagName, matchCounts[tagName], tagDocs]);
                        totalMatch += matchCounts[tagName];
                    }
                }
            }

            if (filteredChildren.length === 0 && filteredTags.length === 0) return null;

            return {
                name: node.name,
                n: node.n,
                c: filteredChildren.length > 0 ? filteredChildren : undefined,
                t: filteredTags.length > 0 ? filteredTags : undefined,
                _matchCount: totalMatch
            };
        };

        /**
         * Returns a small emoji logo based on URL domain.
         */
        const getDocLogo = (url) => {
            if (!url) return '\uD83D\uDCC4';
            if (url.includes('github.com')) return '\uD83D\uDCBB';
            if (url.includes('twitter.com') || url.includes('x.com')) return '\uD835\uDD4F';
            if (url.includes('arxiv.org')) return '\uD83D\uDCDD';
            if (url.includes('huggingface.co')) return '\uD83E\uDD17';
            return '\uD83D\uDD17';
        };

        /**
         * Recursive tree node component for folders and tags.
         */
        const TAG_DOC_LIMIT = 10;

        /**
         * Sorts docs: matched URLs first, then by date descending.
         */
        const sortTagDocs = (docs, matchedUrls) => {
            return [...docs].sort((a, b) => {
                const aMatched = matchedUrls.has(a.u) ? 0 : 1;
                const bMatched = matchedUrls.has(b.u) ? 0 : 1;
                if (aMatched !== bMatched) return aMatched - bMatched;
                return (b.d || '').localeCompare(a.d || '');
            });
        };

        /**
         * Recursive tree node component for folders and tags.
         */
        const TreeNode = ({ node, path, expanded, onToggle, onClickTag, isFiltered, expandedTags, onToggleTag, matchedUrls, showAllTags, onToggleShowAll }) => {
            const hasChildren = (node.c && node.c.length > 0) || (node.t && node.t.length > 0);
            const isExpanded = expanded.has(path);

            return (
                <div className="tree-node">
                    <div
                        className={`tree-header ${isFiltered && node._matchCount ? 'matching' : ''}`}
                        onClick={() => hasChildren && onToggle(path)}
                    >
                        <span className="tree-chevron">
                            {hasChildren ? (isExpanded ? '\u25BE' : '\u25B8') : '\u2003'}
                        </span>
                        <span className="tree-icon">{'\uD83D\uDCC1'}</span>
                        <span className="tree-name" onClick={(e) => { e.stopPropagation(); onClickTag(node.name); }}>
                            {node.name}
                        </span>
                        <span className="tree-count">
                            {isFiltered && node._matchCount ? node._matchCount : node.n}
                        </span>
                    </div>
                    {isExpanded && hasChildren && (
                        <div className="tree-children">
                            {(node.c || []).map(child => (
                                <TreeNode
                                    key={child.name}
                                    node={child}
                                    path={`${path}/${child.name}`}
                                    expanded={expanded}
                                    onToggle={onToggle}
                                    onClickTag={onClickTag}
                                    isFiltered={isFiltered}
                                    expandedTags={expandedTags}
                                    onToggleTag={onToggleTag}
                                    matchedUrls={matchedUrls}
                                    showAllTags={showAllTags}
                                    onToggleShowAll={onToggleShowAll}
                                />
                            ))}
                            {(node.t || []).map(([tagName, tagCount, tagDocs]) => {
                                const tagPath = `${path}/#${tagName}`;
                                const isTagExpanded = expandedTags.has(tagPath);
                                const hasDocs = tagDocs && tagDocs.length > 0;
                                const sorted = hasDocs ? sortTagDocs(tagDocs, matchedUrls) : [];
                                const showAll = showAllTags.has(tagPath);
                                const visible = showAll ? sorted : sorted.slice(0, TAG_DOC_LIMIT);
                                const hasMore = sorted.length > TAG_DOC_LIMIT;
                                return (
                                    <div key={tagName} className="tree-tag-group">
                                        <div
                                            className={`tree-leaf ${isFiltered ? 'matching' : ''}`}
                                            onClick={() => hasDocs && onToggleTag(tagPath)}
                                        >
                                            <span className="tree-chevron">
                                                {hasDocs ? (isTagExpanded ? '\u25BE' : '\u25B8') : '\u2003'}
                                            </span>
                                            <span className="tree-icon">{'\uD83C\uDFF7\uFE0F'}</span>
                                            <span className="tree-name" onClick={(e) => { e.stopPropagation(); onClickTag(tagName); }}>
                                                {tagName}
                                            </span>
                                            <span className="tree-count">{tagCount}</span>
                                        </div>
                                        {isTagExpanded && hasDocs && (
                                            <div className="tree-docs">
                                                {visible.map((doc, i) => (
                                                    <a
                                                        key={doc.u || i}
                                                        className={`tree-doc ${matchedUrls.has(doc.u) ? 'tree-doc-matched' : ''}`}
                                                        href={doc.u}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                    >
                                                        <span className="tree-doc-logo">{getDocLogo(doc.u)}</span>
                                                        <span className="tree-doc-title">{doc.t}</span>
                                                        <span className="tree-doc-date">{doc.d}</span>
                                                    </a>
                                                ))}
                                                {hasMore && (
                                                    <button
                                                        className="tree-doc-show-more"
                                                        onClick={() => onToggleShowAll(tagPath)}
                                                    >
                                                        {showAll
                                                            ? 'Show less'
                                                            : `Show all ${sorted.length} documents`}
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        /**
         * FolderTree component: renders the full or filtered tree.
         */
        const FolderTree = ({ tree, documents, query, onClickTag }) => {
            const [expandedTags, setExpandedTags] = useState(new Set());
            const [showAllTags, setShowAllTags] = useState(new Set());

            const handleToggleTag = useCallback((tagPath) => {
                setExpandedTags(prev => {
                    const next = new Set(prev);
                    if (next.has(tagPath)) {
                        next.delete(tagPath);
                    } else {
                        next.add(tagPath);
                    }
                    return next;
                });
            }, []);

            const handleToggleShowAll = useCallback((tagPath) => {
                setShowAllTags(prev => {
                    const next = new Set(prev);
                    if (next.has(tagPath)) {
                        next.delete(tagPath);
                    } else {
                        next.add(tagPath);
                    }
                    return next;
                });
            }, []);

            // Set of matched document URLs for relevancy sorting
            const matchedUrls = useMemo(() => {
                const urls = new Set();
                for (const doc of documents) {
                    if (doc.url) urls.add(doc.url);
                }
                return urls;
            }, [documents]);

            // Build match counts from search result tags
            const matchCounts = useMemo(() => {
                if (!query.trim() || !documents.length) return {};
                const counts = {};
                for (const doc of documents) {
                    const allTags = (doc.tags || []).concat(doc["extra-tags"] || []);
                    for (const tag of allTags) {
                        if (tag) counts[tag] = (counts[tag] || 0) + 1;
                    }
                }
                return counts;
            }, [documents, query]);

            const hasMatches = query.trim().length > 0 && Object.keys(matchCounts).length > 0;

            // Reverse index: tag -> top-level folder name
            const tagIndex = useMemo(() => buildTagIndex(tree), [tree]);

            // Folder order based on document position
            const folderOrder = useMemo(() => {
                if (!hasMatches) return {};
                const order = {};
                let rank = 0;
                for (const doc of documents) {
                    const allTags = (doc.tags || []).concat(doc["extra-tags"] || []);
                    for (const tag of allTags) {
                        const folder = tagIndex[tag];
                        if (folder && !(folder in order)) {
                            order[folder] = rank++;
                        }
                    }
                }
                return order;
            }, [documents, tagIndex, hasMatches]);

            // Filter tree then sort children by document order
            const children = useMemo(() => {
                if (!tree || !hasMatches) return [];
                const filtered = filterTree(tree, matchCounts);
                if (!filtered || !filtered.c) return [];
                return [...filtered.c].sort((a, b) =>
                    (folderOrder[a.name] ?? Infinity) - (folderOrder[b.name] ?? Infinity)
                );
            }, [tree, hasMatches, matchCounts, folderOrder]);

            // Auto-expand all folder paths and tag paths
            const { allFilteredPaths, autoExpandedTags } = useMemo(() => {
                const paths = new Set();
                const tagPaths = new Set();
                const walk = (node, path) => {
                    paths.add(path);
                    if (node.t) {
                        for (const [tagName] of node.t) {
                            tagPaths.add(`${path}/#${tagName}`);
                        }
                    }
                    if (node.c) {
                        for (const child of node.c) walk(child, `${path}/${child.name}`);
                    }
                };
                for (const child of children) walk(child, `root/${child.name}`);
                return { allFilteredPaths: paths, autoExpandedTags: tagPaths };
            }, [children]);

            // Merge auto-expanded tags with manually toggled ones
            const effectiveExpandedTags = useMemo(() => {
                const merged = new Set(autoExpandedTags);
                for (const p of expandedTags) merged.add(p);
                return merged;
            }, [autoExpandedTags, expandedTags]);

            if (children.length === 0) return null;

            return (
                <div className="folder-tree">
                    <div className="folder-tree-header">
                        <span className="folder-tree-title">Matching Folders</span>
                        <span className="folder-tree-count">{children.length} folders</span>
                    </div>
                    {children.map(child => (
                        <TreeNode
                            key={child.name}
                            node={child}
                            path={`root/${child.name}`}
                            expanded={allFilteredPaths}
                            onToggle={() => {}}
                            onClickTag={onClickTag}
                            isFiltered={true}
                            expandedTags={effectiveExpandedTags}
                            onToggleTag={handleToggleTag}
                            matchedUrls={matchedUrls}
                            showAllTags={showAllTags}
                            onToggleShowAll={handleToggleShowAll}
                        />
                    ))}
                </div>
            );
        };

        /**
         * The main Search component.
         */
        const Search = () => {
            // --- State Management ---
            const [query, setQuery] = useState("");
            const [selectedNode, setSelectedNode] = useState(null);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            const [modelStatus, setModelStatus] = useState("Loading Script...");
            const [documents, setDocuments] = useState([]);
            const [isSortedByDate, setIsSortedByDate] = useState(false);
            const [resultsReranked, setResultsReranked] = useState(false);
            const [sourceFilter, setSourceFilter] = useState("all");
            const [tree, setTree] = useState(null);
            const [theme, setTheme] = useState(document.documentElement.getAttribute('data-theme') || 'dark');

            // --- Refs ---
            const searchTimerRef = useRef(null);
            const workerRef = useRef(null);
            const latestQueryIdRef = useRef(0);
            const rerankTimerRef = useRef(null);

            // --- Function Declarations ---

            /**
             * Fetches the latest documents from the backend.
             */
            const fetchLatest = useCallback(() => {
                fetch(`${API_BASE_URL}/latest/${FETCH_COUNT}`)
                    .then(res => res.json())
                    .then(data => setDocuments(data.documents))
                    .catch(error => console.error("[APP] Failed to fetch latest documents:", error));
            }, []);

            /**
             * Fetches search results from the backend API.
             */
            const search = useCallback((searchQuery, sortChronologically = false) => {
                if (!searchQuery.trim()) {
                    fetchLatest();
                    return;
                }
                const queryId = ++latestQueryIdRef.current;
                const sortType = sortChronologically ? 'true' : 'false';
                const nodeFilter = selectedNode || 'null';
                const endpoint = `${API_BASE_URL}/search/${sortType}/${nodeFilter}/${searchQuery.replace("/", "")}`;

                fetch(endpoint)
                    .then(res => res.json())
                    .then(data => {
                        const initialDocs = Object.values(data["documents"]).map(doc => ({ ...doc }));
                        setDocuments(initialDocs);
                    })
                    .catch(error => console.error(`[APP] Failed to fetch search results:`, error));
            }, [selectedNode, fetchLatest]);

            /**
             * Runs search immediately, clearing any pending debounced calls.
             */
            const runNow = useCallback((runQuery, sortChronologically = true) => {
                setResultsReranked(false);
                clearTimeout(rerankTimerRef.current);
                clearTimeout(searchTimerRef.current);
                search(runQuery, sortChronologically);
            }, [search]);

            // --- Effects ---

            /**
             * Load folder tree on mount.
             */
            useEffect(() => {
                fetch('folder_tree.json')
                    .then(res => res.json())
                    .then(data => setTree(data))
                    .catch(error => console.error("[APP] Failed to load folder tree:", error));
            }, []);

            /**
             * Initializes the Web Worker on component mount.
             */
            useEffect(() => {
                const worker = new Worker('colbert.worker.js', { type: 'module' });
                workerRef.current = worker;
                worker.postMessage({ type: 'load' });

                worker.onmessage = event => {
                    const { type, payload, queryId } = event.data;
                    switch (type) {
                        case 'status':
                            setModelStatus(payload);
                            break;
                        case 'model-ready':
                            setModelStatus("Model Ready");
                            break;
                        case 'rank-update':
                        case 'rank-complete':
                            if (queryId === latestQueryIdRef.current) {
                                setDocuments(payload);
                                setResultsReranked(true);
                            }
                            break;
                        case 'error':
                            setModelStatus(payload);
                            console.error("[APP] Received error from worker:", payload);
                            break;
                    }
                };

                return () => worker.terminate();
            }, []);

            /**
             * Effect to handle initial page load.
             */
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlQuery = params.get("query") || "";
                const urlNode = params.get("node") || null;
                if (urlQuery) {
                    setQuery(urlQuery);
                    if (urlNode) {
                        setSelectedNode(urlNode);
                        runNow(`${urlQuery} ${urlNode}`);
                    } else {
                        runNow(urlQuery, true);
                    }
                } else {
                    fetchLatest();
                }
            }, []);

            /**
             * Re-fetch when source filter changes.
             */
            useEffect(() => {
                if (!query.trim()) {
                    fetchLatest();
                }
            }, [sourceFilter]);

            /**
             * Effect to handle window resizing for mobile detection.
             */
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth <= 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            /**
             * Effect to automatically re-rank results after inactivity.
             */
            useEffect(() => {
                clearTimeout(rerankTimerRef.current);

                const shouldAttemptRerank =
                    modelStatus === 'Model Ready' &&
                    !resultsReranked &&
                    documents.length > 0 &&
                    query.trim() &&
                    !isSortedByDate;

                if (shouldAttemptRerank) {
                    rerankTimerRef.current = setTimeout(() => {
                        workerRef.current.postMessage({
                            type: 'rank',
                            payload: { query, documents, queryId: latestQueryIdRef.current }
                        });
                    }, RERANK_INACTIVITY_MS);
                }

                return () => clearTimeout(rerankTimerRef.current);
            }, [documents, query, modelStatus, resultsReranked, isSortedByDate]);


            // --- Event Handlers ---

            const handleChangeText = useCallback((event) => {
                const newQuery = event.target.value.toLowerCase();
                setQuery(newQuery);
                setSelectedNode(null);
                setIsSortedByDate(false);
                setResultsReranked(false);
                window.history.pushState({}, null, `?query=${encodeURIComponent(newQuery)}`);

                clearTimeout(rerankTimerRef.current);
                clearTimeout(searchTimerRef.current);
                searchTimerRef.current = setTimeout(() => search(newQuery), SEARCH_DEBOUNCE_MS);
            }, [search]);

            const handleClickDate = useCallback(() => {
                const newSortState = !isSortedByDate;
                setIsSortedByDate(newSortState);
                setResultsReranked(false);
                clearTimeout(rerankTimerRef.current);
                search(query, newSortState);
            }, [isSortedByDate, query, search]);

            const handleClickTag = useCallback((tag) => {
                const newQuery = `${query} ${tag}`.trim();
                setQuery(newQuery);
                setIsSortedByDate(false);
                setResultsReranked(false);
                const searchInput = document.getElementById("search");
                if (searchInput) searchInput.value = newQuery;
                window.history.pushState({}, null, `?query=${encodeURIComponent(newQuery)}`);
                runNow(newQuery, true);
            }, [query, runNow]);

            // --- UI Helper Functions ---

            const getDocumentSource = (doc) => {
                const url = doc.url || "";
                const title = (doc.title || "").toLowerCase();
                const allTags = (doc.tags || []).concat(doc["extra-tags"] || []);
                const tagsLower = allTags.map(t => (t || "").toLowerCase());

                if (url.includes("github.com")) return "github";
                if (url.includes("twitter.com") || url.includes("x.com")) return "twitter";
                if (title.includes("hackernews") || tagsLower.some(t => t.includes("hackernews"))) return "hackernews";
                if (url.includes("huggingface.co")) return "huggingface";
                if (url.includes("arxiv.org") || tagsLower.some(t => t.includes("arxiv"))) return "arxiv";
                return "other";
            };

            const getLinkLogo = (doc) => {
                const url = doc.url || "";
                const title = (doc.title || "").toLowerCase();
                const allTags = (doc.tags || []).concat(doc["extra-tags"] || []);
                const hasHackerNewsTag = allTags.some(tag => (tag || "").toLowerCase().includes("hackernews"));

                if (url.includes("github.com")) {
                    return <img src="github.png" alt="GitHub Logo" />;
                }
                if (url.includes("twitter.com") || url.includes("x.com")) {
                    return <img src="twitter.png" alt="Twitter Logo" />;
                }
                if (title.includes("hackernews") || hasHackerNewsTag) {
                    return <img src="hackernews.png" alt="Hackernews Logo" />;
                }
                return '\uD83D\uDCC4';
            };

            const getIndicatorClass = (status) => {
                if (status === "Model Ready") return 'status-ready';
                if (status.startsWith("Error")) return 'status-error';
                return 'status-loading';
            };

            const truncate = (text, limit) => {
                if (!text) return "";
                const tokens = text.trim().split(/\s+/);
                if (tokens.length <= limit) {
                    return tokens.join(' ');
                }
                return tokens.slice(0, limit).join(" ") + "...";
            };

            const highlight = useCallback((text) => {
                if (!text) return "";
                let keywords = query;
                if (selectedNode) keywords += ` ${selectedNode}`;
                const keywordSet = new Set(keywords.toLowerCase().split(/\s+/).filter(token => token.length > 2));
                if (keywordSet.size === 0) return <div className="inline">{text}</div>;

                const parts = text.split(new RegExp(`(${Array.from(keywordSet).join("|")})`, 'gi'));
                return (
                    <div className="inline">
                        {parts.map((part, i) =>
                            keywordSet.has(part.toLowerCase())
                                ? <div className="highlight" key={i}>{part}</div>
                                : part
                        )}
                    </div>
                );
            }, [query, selectedNode]);

            // --- Computed: filter by source then cap at DISPLAY_COUNT ---
            const displayedDocs = useMemo(() => {
                const filtered = (documents || [])
                    .filter(doc => sourceFilter === "all" || getDocumentSource(doc) === sourceFilter);
                return filtered.slice(0, DISPLAY_COUNT);
            }, [documents, sourceFilter]);

            // --- Render ---
            const folderPanel = document.getElementById('folder-panel');

            return (
                <React.Fragment>
                    <div id="search-container">
                        <input
                            id="search"
                            type="textarea"
                            placeholder="Neural Search"
                            value={query}
                            onChange={handleChangeText}
                            autoFocus
                        />
                        <span
                            className={`status-indicator ${getIndicatorClass(modelStatus)}`}
                            title={modelStatus}>
                        </span>
                    </div>

                    <div id="controls-row">
                        <div id="source-filter">
                            {[
                                { key: "all", label: "All" },
                                { key: "github", label: "GitHub" },
                                { key: "twitter", label: "X" },
                                { key: "hackernews", label: "HackerNews" },
                                { key: "huggingface", label: "HuggingFace" },
                                { key: "arxiv", label: "arXiv" },
                            { key: "other", label: "Other" },
                        ].map(({ key, label }) => (
                            <button
                                key={key}
                                className={`source-chip ${sourceFilter === key ? "active" : ""}`}
                                onClick={() => setSourceFilter(key)}
                            >
                                {label}
                            </button>
                        ))}
                        </div>
                        <button
                            className="theme-toggle"
                            onClick={() => {
                                const next = theme === 'dark' ? 'light' : 'dark';
                                document.documentElement.setAttribute('data-theme', next);
                                localStorage.setItem('theme', next);
                                setTheme(next);
                            }}
                            aria-label="Toggle theme"
                        >
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                {theme === 'dark' ? (
                                    <React.Fragment>
                                        <circle cx="12" cy="12" r="5" />
                                        <line x1="12" y1="1" x2="12" y2="3" />
                                        <line x1="12" y1="21" x2="12" y2="23" />
                                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                                        <line x1="1" y1="12" x2="3" y2="12" />
                                        <line x1="21" y1="12" x2="23" y2="12" />
                                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                                    </React.Fragment>
                                ) : (
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                                )}
                            </svg>
                        </button>
                    </div>

                    <div id="documents">
                        {displayedDocs.map((doc, index) => (
                            <div className="document" key={doc.url || index}>
                                <div className="title-wrapper">
                                    <span className="logo">{getLinkLogo(doc)}</span>
                                    <a className="title" href={doc.url} target="_blank" rel="noopener noreferrer">
                                        {highlight(doc.title)}
                                    </a>
                                </div>
                                <div className="date" onClick={handleClickDate}>
                                    {highlight(doc.date)}
                                </div>
                                <div className="summary">
                                    {highlight(truncate(doc.summary, SUMMARY_TOKEN_LIMIT))}
                                </div>
                                <div className="tags">
                                    {(doc.tags || []).concat(doc["extra-tags"] || []).map((tag, i) => (
                                        <div className="tag" key={i} onClick={() => handleClickTag(tag)}>
                                            {highlight(tag)}
                                        </div>
                                    ))}
                                    {typeof doc.colbertScore === 'number' ? (
                                        <span className="score-badge reranker-score" title="Re-ranker Score">
                                            {doc.colbertScore.toFixed(3)}
                                        </span>
                                    ) : typeof doc.similarity === 'number' ? (
                                        <span className="score-badge retriever-score" title="Retriever Score">
                                            {doc.similarity.toFixed(3)}
                                        </span>
                                    ) : null}
                                </div>
                            </div>
                        ))}
                    </div>

                    {folderPanel && !isMobile && createPortal(
                        <FolderTree
                            tree={tree}
                            documents={displayedDocs}
                            query={query}
                            onClickTag={handleClickTag}
                        />,
                        folderPanel
                    )}
                </React.Fragment>
            );
        };

        // --- Mount Application ---
        const container = document.getElementById('backsearch');
        const root = createRoot(container);
        root.render(<Search />);
    </script>
</body>

</html>
