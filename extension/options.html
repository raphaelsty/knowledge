<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #0a0a0f;
        color: #f0f0f5;
        padding: 20px;
        min-width: 320px;
      }
      h2 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #a0a0b0;
        margin-bottom: 6px;
        font-weight: 500;
      }
      input {
        width: 100%;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        color: #f0f0f5;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: rgba(16, 185, 129, 0.4);
      }
      button {
        margin-top: 14px;
        padding: 8px 20px;
        background: linear-gradient(135deg, #10b981 0%, #06d6a0 100%);
        color: #080808;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.9;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #10b981;
      }
    </style>
  </head>
  <body>
    <h2>Knowledge Bookmark Settings</h2>
    <label for="api-url">API URL</label>
    <input type="url" id="api-url" placeholder="https://knowledge-web.org" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <script src="compat.js"></script>
    <script src="options.js"></script>
  </body>
</html>
