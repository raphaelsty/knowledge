services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge"]
      interval: 5s
      timeout: 3s
      retries: 5

  search-api:
    build:
      context: .
      target: runtime-cpu
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./multi-vector-database/knowledge:/data/indices/knowledge
      - models:/models
    environment:
      - RUST_LOG=info
      - OPENBLAS_NUM_THREADS=1
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --index-dir
      - /data/indices
      - --model
      - lightonai/answerai-colbert-small-v1-onnx
      - --int8
      - --parallel
      - "16"
      - --batch-size
      - "4"
      - --model-pool-size
      - "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

  data-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@postgres:5432/knowledge
    depends_on:
      postgres:
        condition: service_healthy

  events-api:
    build:
      context: events-api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@postgres:5432/knowledge
      PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: python:3.12-slim
    working_dir: /web
    command: python -m http.server 3000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/web:ro

volumes:
  pgdata:
  models:
